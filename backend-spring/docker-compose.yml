services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_URL=https://diuvzzrbwxdufagcdbuz.supabase.co/rest/v1
      - SUPABASE_APIKEY=${SUPABASE_APIKEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SERVER_PORT=8080
      - CORS_ORIGINS=https://codequestdiplomaproject.web.app,https://codequestdiplomaproject.firebaseapp.com,http://localhost:3000
    volumes:
      - ./src:/app/src
    restart: unless-stopped
