server.port=${SERVER_PORT:8080}

# Supabase REST API (use environment variables for secrets)
supabase.url=${SUPABASE_URL:https://diuvzzrbwxdufagcdbuz.supabase.co/rest/v1}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.apikey=${SUPABASE_APIKEY}

# Firebase service account json file in classpath
firebase.service-account-file=classpath:firebase-service-account.json

# CORS - allow app origins (adjust in production)
spring.mvc.cors.allowed-origins=${CORS_ORIGINS:https://codequestdiplomaproject.web.app,https://codequestdiplomaproject.firebaseapp.com,http://localhost:3000}
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.codecraft=DEBUG
